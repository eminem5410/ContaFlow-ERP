# ══════════════════════════════════════════════════════════════════════════
# ContaFlow ERP — Local Deployment (Windows + Docker Desktop)
# ══════════════════════════════════════════════════════════════════════════
# Usage on Windows:
#   1. cp .env.local.template .env
#   2. Edit .env (set passwords, JWT key)
#   3. docker compose -f docker-compose.local.yml up -d --build
#   4. Open http://localhost in your browser
#
# Or use the PowerShell script:
#   .\deploy-windows.ps1 up
#
# Differences from docker-compose.prod.yml:
#   - HTTP only (no SSL) via nginx on port 80
#   - All services expose ports for local debugging
#   - Mailpit included (SMTP testing)
#   - No resource limits (uses full machine)
#   - Auto-backup every 6 hours
# ══════════════════════════════════════════════════════════════════════════

services:
  # ── PostgreSQL 16 ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: contaflow-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-contaflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-contaflow_local_dev_2024}
      POSTGRES_DB: ${POSTGRES_DB:-contaflow_erp}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./download/migrations/001_initial_create.sql:/docker-entrypoint-initdb.d/01-initial-create.sql:ro
      - ./deploy/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-contaflow} -d ${POSTGRES_DB:-contaflow_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - contaflow-net

  # ── .NET 8 Backend API ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ContaFlow.API/Dockerfile
    container_name: contaflow-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    env_file: .env
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: ${DATABASE_URL}
      ConnectionStrings__Redis: redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379},abortConnect=false
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER:-ContaFlow.API}
      Jwt__Audience: ${JWT_AUDIENCE:-ContaFlow.Client}
      Jwt__ExpiresInMinutes: ${JWT_EXPIRES_MINUTES:-480}
      Kafka__Enabled: ${KAFKA_ENABLED:-true}
      Kafka__BootstrapServers: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      Email__Enabled: ${EMAIL_ENABLED:-true}
      Email__SmtpHost: ${EMAIL_SMTP_HOST:-mailpit}
      Email__SmtpPort: ${EMAIL_SMTP_PORT:-1025}
      Email__SmtpUser: ${EMAIL_SMTP_USER:-}
      Email__SmtpPassword: ${EMAIL_SMTP_PASSWORD:-}
      Email__FromName: ${EMAIL_FROM_NAME:-ContaFlow ERP}
      Email__FromEmail: ${EMAIL_FROM_EMAIL:-noreply@contaflow.com}
      Email__UseSsl: ${EMAIL_USE_SSL:-false}
      Cors__AllowedOrigins: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:3000,http://localhost:8080}
      AutoMigrate: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - contaflow-net

  # ── Next.js Frontend App ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contaflow-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file: .env
    environment:
      BACKEND_URL: http://backend:8080
      DATABASE_URL_PRISMA: postgresql://${POSTGRES_USER:-contaflow}:${POSTGRES_PASSWORD:-contaflow_local_dev_2024}@postgres:5432/${POSTGRES_DB:-contaflow_erp}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - contaflow-net

  # ── Nginx Reverse Proxy (HTTP only, no SSL) ──────────────────────────
  nginx:
    image: nginx:alpine
    container_name: contaflow-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/nginx-local.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/logs:/var/log/nginx
    depends_on:
      - app
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - contaflow-net

  # ── Kafka + Zookeeper ─────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: contaflow-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - contaflow-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: contaflow-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - contaflow-net

  # ── Redis Cache ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: contaflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - contaflow-net

  # ── Mailpit — SMTP Testing (included in local deploy) ─────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: contaflow-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"   # SMTP
      - "${MAILPIT_WEB_PORT:-8025}:8025"     # Web UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    healthcheck:
      test: ["CMD", "/mailpit", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - contaflow-net

  # ── PostgreSQL Auto-Backup (every 6 hours for local) ─────────────────
  pg-backup:
    image: postgres:16-alpine
    container_name: contaflow-pg-backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-contaflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-contaflow_local_dev_2024}
      POSTGRES_DB: ${POSTGRES_DB:-contaflow_erp}
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: "7"
      BACKUP_SCHEDULE: "0 */6 * * *"
    volumes:
      - ./deploy/backups:/backups
      - ./deploy/scripts/backup-entrypoint.sh:/backup-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/backup-entrypoint.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - contaflow-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  contaflow-net:
    driver: bridge
