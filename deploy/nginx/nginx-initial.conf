# ── ContaFlow ERP — Nginx Initial Config (before SSL) ──────────────────
# Used during initial setup before Let's Encrypt certificate is obtained.
# Replace with nginx.conf after running certbot.

upstream nextjs_app {
    server app:3000;
}

upstream dotnet_api {
    server backend:8080;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 20M;

    # Allow certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Backend API
    location /api/ {
        proxy_pass http://dotnet_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # Health checks
    location ~* ^/(health|health/ready|health/live) {
        proxy_pass http://dotnet_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Mailpit Web UI
    location /mailpit/ {
        proxy_pass http://mailpit:8025/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Frontend (catch all)
    location / {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
    }

    # Static assets cached
    location /_next/static/ {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Deny hidden paths
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
