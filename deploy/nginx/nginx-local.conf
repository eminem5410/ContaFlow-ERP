# ══════════════════════════════════════════════════════════════════════════
# ContaFlow ERP — Nginx Local Config (HTTP Only, sin SSL)
# ══════════════════════════════════════════════════════════════════════════
# Para deploy local en Windows con Docker Desktop.
# Mismo routing que nginx.conf de produccion, pero HTTP puro.
# Cuando migres a Ubuntu VPS, usa deploy/nginx/nginx.conf (con SSL).
# ══════════════════════════════════════════════════════════════════════════

# ── Rate limiting zones ─────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

# ── Upstream definitions ────────────────────────────────────────────────
upstream nextjs_app {
    server app:3000;
}

upstream dotnet_api {
    server backend:8080;
}

# ── Main server (HTTP only) ────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ── Security Headers (basic, sin HSTS) ──────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip Compression ────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # ── Client body limits ─────────────────────────────────────────────
    client_max_body_size 20M;

    # ── Backend API routes ─────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;

        proxy_pass http://dotnet_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ── Login / Auth endpoints (stricter rate limit) ───────────────────
    location ~* ^/api/auth/login {
        limit_req zone=auth_limit burst=10 nodelay;

        proxy_pass http://dotnet_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
    }

    # ── Swagger (disponible en modo Development) ───────────────────────
    location /swagger {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://dotnet_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ── Health check endpoints (sin rate limit) ────────────────────────
    location ~* ^/(health|health/ready|health/live) {
        proxy_pass http://dotnet_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # ── Mailpit Web UI (SMTP testing) ─────────────────────────────────
    location /mailpit/ {
        proxy_pass http://mailpit:8025/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Next.js App (frontend) — catch all ────────────────────────────
    location / {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Next.js static assets (con cache agresivo) ───────────────────
    location /_next/static/ {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /images/ {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ── Favicon y robots ──────────────────────────────────────────────
    location = /favicon.ico {
        proxy_pass http://nextjs_app;
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        proxy_pass http://nextjs_app;
        access_log off;
        log_not_found off;
    }

    # ── Denegar paths ocultos ────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
