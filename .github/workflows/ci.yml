name: ContaFlow ERP — CI

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  DOTNET_VERSION: '8.0.x'

jobs:
  # ── Frontend — Build & Lint ───────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint --max-warnings=100 || true

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/contaflow_test"
          JWT_SECRET: "ci_test_secret_key_for_testing_only_2024"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: frontend-build
          path: .next/
          retention-days: 7

  # ── Backend — Build & Test ────────────────────────────────────────────────
  backend-build:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Run Domain tests
        run: dotnet test ContaFlow.Domain.Tests --no-restore --configuration Release --verbosity minimal
        continue-on-error: true

      - name: Run Application tests
        run: dotnet test ContaFlow.Application.Tests --no-restore --configuration Release --verbosity minimal
        continue-on-error: true

      - name: Check for .NET vulnerabilities
        run: |
          dotnet list ContaFlow.API/package.json --vulnerable --include-transitive 2>/dev/null || true
        continue-on-error: true

  # ── Docker — Build Verification ───────────────────────────────────────────
  docker-build:
    name: Docker — Build Verification
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Construir imagen Docker del frontend Next.js
      - name: Build Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: contaflow-frontend:verify

      # Construir imagen Docker del backend .NET
      - name: Build Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/ContaFlow.API/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: contaflow-backend:verify

  # ── Security — Dependency Scan ────────────────────────────────────────────
  security-scan:
    name: Security — Dependency Scan
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Auditoría de dependencias npm
      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      # Escaneo de vulnerabilidades con Trivy — frontend
      - name: Run Trivy vulnerability scanner (frontend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'package-lock.json'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
        continue-on-error: true

      # Escaneo de vulnerabilidades con Trivy — backend
      - name: Run Trivy vulnerability scanner (backend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'backend/ContaFlow.API/ContaFlow.API.csproj'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
        continue-on-error: true
